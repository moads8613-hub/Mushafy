<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>مصحفي</title>

<!-- PWA Meta Tags -->
<meta name="application-name" content="مصحفي">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="مصحفي">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0a05">
<meta name="description" content="تطبيق مصحفي - اقرأ القرآن الكريم">

<!-- Manifest -->
<link rel="manifest" id="manifestLink">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

<style>
:root {
  --ink: #1a0f00;
  --parchment: #faf3e0;
  --gold: #b8922a;
  --gold-light: #d4a843;
  --gold-bright: #e8c060;
  --gold-dim: rgba(184,146,42,0.18);
  --gold-glow: rgba(212,168,67,0.35);
  --red: #8b2020;
  --deep: #0d0a05;
  --page-width: 700px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  overscroll-behavior: none;
}

body {
  background-color: var(--deep);
  min-height: 100vh;
  min-height: -webkit-fill-available;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 28px 16px calc(56px + var(--safe-bottom));
  font-family: 'Amiri', serif;
  position: relative;
  overflow-x: hidden;
  background-image:
    repeating-linear-gradient(45deg,  rgba(184,146,42,0.03) 0px, rgba(184,146,42,0.03) 1px, transparent 1px, transparent 28px),
    repeating-linear-gradient(-45deg, rgba(184,146,42,0.03) 0px, rgba(184,146,42,0.03) 1px, transparent 1px, transparent 28px),
    repeating-linear-gradient(0deg,   rgba(184,146,42,0.02) 0px, rgba(184,146,42,0.02) 1px, transparent 1px, transparent 28px),
    repeating-linear-gradient(90deg,  rgba(184,146,42,0.02) 0px, rgba(184,146,42,0.02) 1px, transparent 1px, transparent 28px);
}

/* ═══ HEADER ═══ */
header {
  width: 100%;
  max-width: var(--page-width);
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  gap: 16px;
}

.app-title {
  color: var(--gold-light);
  font-size: 1.3rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  white-space: nowrap;
  text-shadow: 0 0 20px rgba(212,168,67,0.4);
}
.app-title small {
  display: block;
  font-size: 0.62rem;
  color: #7a6040;
  letter-spacing: 0.12em;
  font-weight: 400;
  margin-top: 1px;
}

.progress-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 5px;
}
.progress-label { color: #8a7050; font-size: 0.75rem; direction: ltr; letter-spacing: 0.04em; }
.progress-bar-outer {
  width: 100%; height: 3px;
  background: #1e1608; border-radius: 2px; overflow: hidden;
}
.progress-bar-inner {
  height: 100%;
  background: linear-gradient(90deg, var(--gold) 0%, var(--gold-bright) 100%);
  border-radius: 2px;
  transition: width 0.6s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 0 8px var(--gold-glow);
}

/* ═══ PAGE CARD ═══ */
.page-card {
  width: 100%;
  max-width: var(--page-width);
  background: linear-gradient(180deg, #faf3e0 0%, #f5e8c8 40%, #f0e0b8 100%);
  position: relative;
  box-shadow:
    0 0 0 1px var(--gold),
    0 0 0 7px var(--deep),
    0 0 0 8px rgba(184,146,42,0.3),
    0 0 0 9px var(--deep),
    0 0 0 10px rgba(184,146,42,0.12),
    0 20px 80px rgba(0,0,0,0.9),
    0 4px 20px rgba(0,0,0,0.6);
}
.page-card::before {
  content: ''; position: absolute; inset: 10px;
  border: 1px solid rgba(184,146,42,0.25);
  pointer-events: none; z-index: 2;
}
.page-card::after {
  content: ''; position: absolute; inset: 13px;
  border: 1px solid rgba(184,146,42,0.12);
  pointer-events: none; z-index: 2;
}

/* ═══ CORNERS ═══ */
.corner {
  position: absolute; width: 44px; height: 44px;
  z-index: 3; pointer-events: none;
}
.corner svg { width: 100%; height: 100%; }
.corner-tl { top: 4px; right: 4px; }
.corner-tr { top: 4px; left: 4px; transform: scaleX(-1); }
.corner-bl { bottom: 4px; right: 4px; transform: scaleY(-1); }
.corner-br { bottom: 4px; left: 4px; transform: scale(-1,-1); }

/* ═══ PAGE HEADER ═══ */
.page-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 52px 12px;
  border-bottom: 1px solid rgba(184,146,42,0.2);
  background: linear-gradient(to bottom, rgba(225,205,160,0.5), transparent);
  position: relative; z-index: 1;
  flex-wrap: wrap; gap: 6px;
}
.page-header::after {
  content: ''; position: absolute; bottom: -1px; left: 52px; right: 52px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.header-right { display:flex; flex-direction:column; gap:2px; align-items:flex-end; text-align:right; }
.header-left  { display:flex; flex-direction:column; gap:2px; align-items:flex-start; text-align:left; }
.surah-name-label { font-size: 0.95rem; color: var(--ink); font-weight: 700; }
.juz-label { font-size: 0.72rem; color: var(--gold); letter-spacing: 0.05em; }
.page-number-badge {
  background: linear-gradient(135deg, #c8a030, #b8922a, #c8a030);
  color: var(--parchment); font-size: 0.82rem; padding: 3px 14px;
  border-radius: 20px; font-weight: 700; letter-spacing: 0.08em;
  box-shadow: 0 2px 8px rgba(184,146,42,0.4); white-space: nowrap;
}

/* ═══ ORNAMENT DIVIDER ═══ */
.ornament-divider {
  display: flex; align-items: center; justify-content: center;
  gap: 8px; margin: 0 28px; padding: 6px 0;
}
.ornament-divider .line {
  flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(184,146,42,0.4), transparent);
}
.ornament-divider .diamond     { width:6px; height:6px; background:var(--gold); transform:rotate(45deg); box-shadow:0 0 6px rgba(184,146,42,0.6); }
.ornament-divider .diamond-sm  { width:3px; height:3px; background:rgba(184,146,42,0.5); transform:rotate(45deg); }

/* ═══ PAGE CONTENT ═══ */
.page-content {
  padding: 20px 48px;
  min-height: 400px;
  display: flex; flex-direction: column;
  position: relative; z-index: 1;
}

/* Loading */
.loading-state {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:18px; min-height:360px;
}
.loader-wrap { position:relative; width:48px; height:48px; }
.loader-ring-outer {
  position:absolute; inset:0;
  border:2px solid rgba(184,146,42,0.15); border-top-color:var(--gold);
  border-radius:50%; animation:spin 1.1s linear infinite;
}
.loader-ring-inner {
  position:absolute; inset:8px;
  border:2px solid rgba(184,146,42,0.08); border-bottom-color:var(--gold-light);
  border-radius:50%; animation:spin 0.7s linear infinite reverse;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { color:#a08050; font-size:0.9rem; }

/* Error */
.error-state {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:14px; min-height:360px; text-align:center;
}
.error-icon { font-size:2rem; }
.error-text { color:var(--red); font-size:0.9rem; max-width:280px; line-height:1.7; }
.retry-btn {
  background:none; border:1px solid var(--gold); color:var(--gold);
  padding:6px 22px; border-radius:20px; cursor:pointer;
  font-family:'Amiri',serif; font-size:0.85rem; transition:all 0.2s;
}
.retry-btn:hover { background:var(--gold); color:var(--parchment); }

/* Surah Banner */
.surah-banner { display:flex; align-items:center; justify-content:center; margin:10px 0 8px; }
.surah-banner-inner {
  position:relative; display:inline-flex;
  align-items:center; justify-content:center; padding:6px 36px;
}
.surah-banner-inner::before {
  content:''; position:absolute; top:50%; left:0; right:0;
  height:1px;
  background:linear-gradient(90deg, transparent, var(--gold), var(--gold), transparent);
  transform:translateY(-50%);
}
.surah-banner-box {
  position:relative;
  background:linear-gradient(135deg, #c8a030 0%, #b8922a 40%, #d4a843 70%, #c8a030 100%);
  color:var(--parchment); font-family:'Amiri',serif; font-size:1rem; font-weight:700;
  padding:5px 28px; letter-spacing:0.08em;
  box-shadow:0 2px 12px rgba(184,146,42,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
  clip-path:polygon(12px 0%, calc(100% - 12px) 0%, 100% 50%, calc(100% - 12px) 100%, 12px 100%, 0% 50%);
}
.surah-banner-gem {
  width:10px; height:10px; background:var(--gold);
  transform:rotate(45deg); box-shadow:0 0 8px rgba(212,168,67,0.7);
  flex-shrink:0; margin:0 -5px; position:relative; z-index:1;
}

/* Basmala */
.basmala {
  text-align:center; font-family:'Amiri Quran','Amiri',serif;
  font-size:1.6rem; color:var(--ink);
  margin:10px 0 14px; padding:10px 0; line-height:2;
}

/* Verses */
.verses-container {
  line-height:2.35; text-align:justify; direction:rtl;
  animation:fadeUp 0.4s ease both;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.verse-text { font-family:'Amiri Quran','Amiri',serif; font-size:1.55rem; color:var(--ink); display:inline; }
.verse-number {
  display:inline-flex; align-items:center; justify-content:center;
  width:1.6em; height:1.6em; margin:0 2px;
  font-family:'Amiri',serif; font-size:0.7rem; color:var(--gold);
  position:relative; top:-0.05em; flex-shrink:0;
}
.verse-number::before {
  content:'۞'; font-size:1.7em; position:absolute;
  color:rgba(184,146,42,0.22); top:50%; left:50%; transform:translate(-50%,-50%);
}
.verse-number span { position:relative; z-index:1; }

/* ═══ PAGE FOOTER ═══ */
.page-footer {
  padding: 12px 48px calc(16px + var(--safe-bottom));
  border-top: 1px solid rgba(184,146,42,0.2);
  background: linear-gradient(to top, rgba(220,195,150,0.4), transparent);
  display: flex; align-items: center; justify-content: center;
  gap: 10px; flex-wrap: wrap; position: relative; z-index: 1;
}
.page-footer::before {
  content:''; position:absolute; top:-1px; left:52px; right:52px;
  height:1px; background:linear-gradient(90deg, transparent, var(--gold), transparent);
}
.nav-btn {
  background:none; border:1px solid rgba(184,146,42,0.3); color:#a08050;
  width:34px; height:34px; border-radius:50%; font-size:1.1rem;
  cursor:pointer; transition:all 0.2s;
  display:flex; align-items:center; justify-content:center;
  font-family:'Amiri',serif;
}
.nav-btn:hover:not(:disabled) { border-color:var(--gold); color:var(--gold); background:rgba(184,146,42,0.08); }
.nav-btn:disabled { opacity:0.25; cursor:not-allowed; }

.goto-wrap { display:flex; align-items:center; gap:5px; }
.goto-label { color:#a08050; font-size:0.78rem; }
.goto-input {
  width:50px; text-align:center;
  background:rgba(240,220,180,0.4); border:1px solid rgba(184,146,42,0.3);
  color:var(--ink); font-family:'Amiri',serif; font-size:0.85rem;
  padding:4px 5px; border-radius:3px; outline:none;
}
.goto-input:focus { border-color:var(--gold); background:rgba(240,220,180,0.7); }
.goto-btn {
  background:none; border:1px solid rgba(184,146,42,0.3); color:#a08050;
  padding:4px 10px; border-radius:3px; font-family:'Amiri',serif;
  font-size:0.78rem; cursor:pointer; transition:all 0.2s;
}
.goto-btn:hover { border-color:var(--gold); color:var(--gold); }

.done-btn {
  background:linear-gradient(135deg, #c8a030 0%, #b8922a 50%, #d4a843 100%);
  color:#faf0d0; border:none; padding:10px 28px;
  font-family:'Amiri',serif; font-size:0.98rem; font-weight:700;
  cursor:pointer; letter-spacing:0.05em; position:relative; overflow:hidden;
  transition:all 0.25s;
  box-shadow:0 2px 14px rgba(184,146,42,0.45), inset 0 1px 0 rgba(255,255,255,0.25);
  clip-path:polygon(8px 0%, calc(100% - 8px) 0%, 100% 50%, calc(100% - 8px) 100%, 8px 100%, 0% 50%);
}
.done-btn:active { transform:scale(0.97); }

/* ═══ INSTALL BANNER ═══ */
.install-banner {
  position: fixed; bottom: calc(16px + var(--safe-bottom)); left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(135deg, #1a1208, #0d0a05);
  border: 1px solid rgba(184,146,42,0.5);
  color: var(--gold-light);
  padding: 12px 20px;
  border-radius: 12px;
  display: flex; align-items: center; gap: 12px;
  font-size: 0.9rem;
  box-shadow: 0 8px 32px rgba(0,0,0,0.8), 0 0 0 1px rgba(184,146,42,0.15);
  z-index: 200;
  animation: slideUp 0.4s ease;
  max-width: calc(100vw - 32px);
  white-space: nowrap;
}
@keyframes slideUp { from{opacity:0;transform:translateX(-50%) translateY(20px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
.install-banner .install-icon { font-size: 1.3rem; flex-shrink:0; }
.install-banner .install-text { font-family:'Amiri',serif; }
.install-banner .install-text small { display:block; font-size:0.72rem; color:#8a7050; margin-top:1px; }
.install-btn {
  background: linear-gradient(135deg, #c8a030, #b8922a);
  color: #faf0d0; border: none; padding: 7px 16px;
  border-radius: 8px; font-family:'Amiri',serif; font-size:0.82rem;
  font-weight:700; cursor:pointer; flex-shrink:0;
  box-shadow: 0 2px 8px rgba(184,146,42,0.4);
}
.install-dismiss {
  background:none; border:none; color:#5a4030;
  cursor:pointer; font-size:1rem; padding:4px; flex-shrink:0;
}

/* ═══ FINISH MODAL ═══ */
.finish-modal {
  position:fixed; inset:0; background:rgba(0,0,0,0.85);
  display:flex; align-items:center; justify-content:center;
  z-index:100; backdrop-filter:blur(6px); animation:fadeUp 0.3s ease;
}
.finish-modal.hidden { display:none; }
.finish-box {
  background:linear-gradient(160deg, #faf3e0, #f0e6c8);
  border:1px solid var(--gold);
  padding:44px 52px; text-align:center;
  max-width:380px; width:90%; position:relative;
  box-shadow:0 0 0 6px #0d0a05, 0 0 0 7px rgba(184,146,42,0.25), 0 24px 80px rgba(0,0,0,0.9);
}
.finish-box::before { content:''; position:absolute; inset:8px; border:1px solid rgba(184,146,42,0.2); pointer-events:none; }
.finish-box::after  { content:''; position:absolute; inset:11px; border:1px solid rgba(184,146,42,0.1); pointer-events:none; }
.finish-icon { font-size:2.8rem; margin-bottom:16px; }
.finish-title { font-size:1.6rem; color:var(--ink); margin-bottom:10px; font-weight:700; }
.finish-sub { color:#7a6040; font-size:0.95rem; line-height:1.8; margin-bottom:24px; }
.restart-btn {
  background:linear-gradient(135deg, #c8a030, #b8922a, #d4a843);
  color:#faf0d0; border:none; padding:10px 30px;
  font-family:'Amiri',serif; font-size:0.95rem; font-weight:700;
  cursor:pointer; transition:opacity 0.2s;
  box-shadow:0 2px 12px rgba(184,146,42,0.4);
  clip-path:polygon(8px 0%, calc(100% - 8px) 0%, 100% 50%, calc(100% - 8px) 100%, 8px 100%, 0% 50%);
}

/* ═══ RESPONSIVE ═══ */
@media (max-width:520px) {
  .page-content { padding:16px 28px; }
  .page-header, .page-footer { padding-left:28px; padding-right:28px; }
  .verse-text { font-size:1.38rem; }
  .corner { width:34px; height:34px; }
  .install-banner { font-size:0.82rem; padding:10px 14px; gap:8px; }
}
</style>
</head>
<body>

<header>
  <div class="app-title">مصحفي<small>MUSHAFI</small></div>
  <div class="progress-wrap">
    <div class="progress-label" id="progressLabel">١ / ٦٠٤</div>
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" id="progressBar" style="width:0.2%"></div>
    </div>
  </div>
</header>

<div class="page-card">
  <!-- زوايا -->
  <div class="corner corner-tl"><svg viewBox="0 0 44 44" fill="none"><path d="M4 4 L20 4 L20 6 L6 6 L6 20 L4 20 Z" fill="rgba(184,146,42,0.5)"/><path d="M8 8 L18 8 L18 10 L10 10 L10 18 L8 18 Z" fill="rgba(184,146,42,0.25)"/><rect x="3" y="3" width="3" height="3" fill="rgba(184,146,42,0.7)" transform="rotate(45 4.5 4.5)"/></svg></div>
  <div class="corner corner-tr"><svg viewBox="0 0 44 44" fill="none"><path d="M4 4 L20 4 L20 6 L6 6 L6 20 L4 20 Z" fill="rgba(184,146,42,0.5)"/><path d="M8 8 L18 8 L18 10 L10 10 L10 18 L8 18 Z" fill="rgba(184,146,42,0.25)"/><rect x="3" y="3" width="3" height="3" fill="rgba(184,146,42,0.7)" transform="rotate(45 4.5 4.5)"/></svg></div>
  <div class="corner corner-bl"><svg viewBox="0 0 44 44" fill="none"><path d="M4 4 L20 4 L20 6 L6 6 L6 20 L4 20 Z" fill="rgba(184,146,42,0.5)"/><path d="M8 8 L18 8 L18 10 L10 10 L10 18 L8 18 Z" fill="rgba(184,146,42,0.25)"/><rect x="3" y="3" width="3" height="3" fill="rgba(184,146,42,0.7)" transform="rotate(45 4.5 4.5)"/></svg></div>
  <div class="corner corner-br"><svg viewBox="0 0 44 44" fill="none"><path d="M4 4 L20 4 L20 6 L6 6 L6 20 L4 20 Z" fill="rgba(184,146,42,0.5)"/><path d="M8 8 L18 8 L18 10 L10 10 L10 18 L8 18 Z" fill="rgba(184,146,42,0.25)"/><rect x="3" y="3" width="3" height="3" fill="rgba(184,146,42,0.7)" transform="rotate(45 4.5 4.5)"/></svg></div>

  <div class="page-header">
    <div class="header-right">
      <div class="surah-name-label" id="surahNameRight">...</div>
      <div class="juz-label" id="juzLabel">...</div>
    </div>
    <div class="page-number-badge" id="pageNumBadge">١</div>
    <div class="header-left">
      <div class="surah-name-label" id="surahNameLeft"></div>
      <div class="juz-label" id="hizbLabel"></div>
    </div>
  </div>

  <div class="ornament-divider">
    <div class="line"></div><div class="diamond-sm"></div>
    <div class="diamond"></div><div class="diamond-sm"></div><div class="line"></div>
  </div>

  <div class="page-content" id="pageContent">
    <div class="loading-state">
      <div class="loader-wrap">
        <div class="loader-ring-outer"></div>
        <div class="loader-ring-inner"></div>
      </div>
      <div class="loading-text">جارٍ التحميل...</div>
    </div>
  </div>

  <div class="ornament-divider">
    <div class="line"></div><div class="diamond-sm"></div>
    <div class="diamond"></div><div class="diamond-sm"></div><div class="line"></div>
  </div>

  <div class="page-footer">
    <button class="nav-btn" id="prevBtn">›</button>
    <div class="goto-wrap">
      <span class="goto-label">انتقل:</span>
      <input class="goto-input" type="number" id="gotoInput" min="1" max="604" placeholder="رقم">
      <button class="goto-btn" id="gotoBtn">اذهب</button>
    </div>
    <button class="done-btn" id="doneBtn"><span>✓ تمت القراءة</span></button>
    <button class="nav-btn" id="nextBtn">‹</button>
  </div>
</div>

<!-- مودال الختم -->
<div class="finish-modal hidden" id="finishModal">
  <div class="finish-box">
    <div class="finish-icon">🌙</div>
    <div class="finish-title">ختمت القرآن الكريم</div>
    <div class="finish-sub">بارك الله لك وجعله في ميزان حسناتك.<br>اللهم اجعله شفيعاً لنا يوم القيامة.</div>
    <button class="restart-btn" id="restartBtn">ابدأ من الصفحة الأولى</button>
  </div>
</div>

<!-- بانر التثبيت -->
<div class="install-banner hidden" id="installBanner">
  <span class="install-icon">📲</span>
  <div class="install-text">
    ثبّت مصحفي على هاتفك
    <small>يعمل بدون إنترنت بعد التثبيت</small>
  </div>
  <button class="install-btn" id="installBtn">تثبيت</button>
  <button class="install-dismiss" id="dismissBtn">✕</button>
</div>

<script>
// ═══════════════════════════════
//  PWA — Service Worker & Manifest
// ═══════════════════════════════
const CACHE_NAME = 'mushafi-v1';
const SW_SCRIPT = `
const CACHE = '${CACHE_NAME}';
const ASSETS = [location.pathname];

self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
  ));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  if (e.request.url.includes('api.quran.com') || e.request.url.includes('fonts.googleapis')) return;
  e.respondWith(
    caches.match(e.request).then(r => r || fetch(e.request).then(res => {
      if (res.ok) caches.open(CACHE).then(c => c.put(e.request, res.clone()));
      return res;
    }))
  );
});
`;

// تسجيل Service Worker من blob
if ('serviceWorker' in navigator) {
  const blob = new Blob([SW_SCRIPT], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, { scope: '/' }).catch(() => {});
}

// إنشاء manifest ديناميكياً
const manifest = {
  name: "مصحفي",
  short_name: "مصحفي",
  description: "اقرأ القرآن الكريم",
  start_url: location.href,
  display: "standalone",
  background_color: "#0d0a05",
  theme_color: "#0d0a05",
  orientation: "portrait",
  lang: "ar",
  dir: "rtl",
  icons: [
    { src: generateIcon(192), sizes: "192x192", type: "image/png", purpose: "any maskable" },
    { src: generateIcon(512), sizes: "512x512", type: "image/png", purpose: "any maskable" }
  ]
};

function generateIcon(size) {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');
  // خلفية
  ctx.fillStyle = '#0d0a05';
  ctx.fillRect(0, 0, size, size);
  // دائرة ذهبية
  const cx = size / 2, cy = size / 2, r = size * 0.38;
  ctx.strokeStyle = '#b8922a';
  ctx.lineWidth = size * 0.04;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
  // نص
  ctx.fillStyle = '#d4a843';
  ctx.font = `bold ${size * 0.28}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('م', cx, cy);
  return canvas.toDataURL('image/png');
}

const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
document.getElementById('manifestLink').href = URL.createObjectURL(manifestBlob);

// ═══════════════════════════════
//  منطق التطبيق
// ═══════════════════════════════
const TOTAL_PAGES = 604;
const STORAGE_KEY = 'mushaf_current_page';

let currentPage = parseInt(localStorage.getItem(STORAGE_KEY)) || 1;
let isLoading = false;
let chaptersCache = null;
let deferredPrompt = null;

const pageContent    = document.getElementById('pageContent');
const pageNumBadge   = document.getElementById('pageNumBadge');
const surahNameRight = document.getElementById('surahNameRight');
const surahNameLeft  = document.getElementById('surahNameLeft');
const juzLabel       = document.getElementById('juzLabel');
const hizbLabel      = document.getElementById('hizbLabel');
const progressBar    = document.getElementById('progressBar');
const progressLabel  = document.getElementById('progressLabel');
const prevBtn        = document.getElementById('prevBtn');
const nextBtn        = document.getElementById('nextBtn');
const doneBtn        = document.getElementById('doneBtn');
const gotoInput      = document.getElementById('gotoInput');
const gotoBtn        = document.getElementById('gotoBtn');
const finishModal    = document.getElementById('finishModal');
const restartBtn     = document.getElementById('restartBtn');
const installBanner  = document.getElementById('installBanner');
const installBtn     = document.getElementById('installBtn');
const dismissBtn     = document.getElementById('dismissBtn');

function toAr(n) { return String(n).replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]); }

const JUZ_NAMES = {
  1:'الجزء الأول',2:'الجزء الثاني',3:'الجزء الثالث',4:'الجزء الرابع',
  5:'الجزء الخامس',6:'الجزء السادس',7:'الجزء السابع',8:'الجزء الثامن',
  9:'الجزء التاسع',10:'الجزء العاشر',11:'الجزء الحادي عشر',
  12:'الجزء الثاني عشر',13:'الجزء الثالث عشر',14:'الجزء الرابع عشر',
  15:'الجزء الخامس عشر',16:'الجزء السادس عشر',17:'الجزء السابع عشر',
  18:'الجزء الثامن عشر',19:'الجزء التاسع عشر',20:'الجزء العشرون',
  21:'الجزء الحادي والعشرون',22:'الجزء الثاني والعشرون',
  23:'الجزء الثالث والعشرون',24:'الجزء الرابع والعشرون',
  25:'الجزء الخامس والعشرون',26:'الجزء السادس والعشرون',
  27:'الجزء السابع والعشرون',28:'الجزء الثامن والعشرون',
  29:'الجزء التاسع والعشرون',30:'الجزء الثلاثون'
};
function getJuzName(n) { return JUZ_NAMES[n] || `الجزء ${toAr(n)}`; }
function getHizbLabel(h) {
  return `الحزب ${toAr(Math.ceil(h/2))}${(h-1)%2===0?'':' — النصف'}`;
}

function updateProgress(page) {
  const pct = ((page-1)/(TOTAL_PAGES-1))*100;
  progressBar.style.width = Math.max(0.25,pct)+'%';
  progressLabel.textContent = `${toAr(page)} / ${toAr(TOTAL_PAGES)}`;
  pageNumBadge.textContent  = toAr(page);
  prevBtn.disabled = page <= 1;
  nextBtn.disabled = page >= TOTAL_PAGES;
}

async function getChapters() {
  if (chaptersCache) return chaptersCache;
  const res  = await fetch('https://api.quran.com/api/v4/chapters?language=ar');
  const data = await res.json();
  chaptersCache = {};
  (data.chapters||[]).forEach(c => { chaptersCache[c.id] = c.name_arabic; });
  return chaptersCache;
}

function buildSurahBanner(name) {
  return `<div class="surah-banner"><div class="surah-banner-inner">
    <div class="surah-banner-gem"></div>
    <div class="surah-banner-box">${name}</div>
    <div class="surah-banner-gem"></div>
  </div></div>`;
}

async function loadPage(pageNum) {
  if (isLoading) return;
  isLoading = true;
  pageContent.innerHTML = `<div class="loading-state"><div class="loader-wrap"><div class="loader-ring-outer"></div><div class="loader-ring-inner"></div></div><div class="loading-text">جارٍ تحميل الصفحة ${toAr(pageNum)}...</div></div>`;
  surahNameRight.textContent = '...';
  surahNameLeft.textContent  = '';
  juzLabel.textContent = '...';
  hizbLabel.textContent = '';
  updateProgress(pageNum);

  try {
    const [versesRes, chapMap] = await Promise.all([
      fetch(`https://api.quran.com/api/v4/verses/by_page/${pageNum}?words=false&translations=&fields=text_uthmani,verse_key,juz_number,hizb_number&per_page=50`),
      getChapters()
    ]);
    if (!versesRes.ok) throw new Error('network');
    const data   = await versesRes.json();
    const verses = data.verses || [];
    if (!verses.length) throw new Error('empty');

    const firstVerse = verses[0];
    const surahNums  = [...new Set(verses.map(v => v.verse_key.split(':')[0]))];
    const surahNames = surahNums.map(n => chapMap[n] || `سورة ${n}`);

    if (surahNames.length >= 2) {
      surahNameRight.textContent = surahNames[0];
      surahNameLeft.textContent  = surahNames[surahNames.length-1];
    } else {
      surahNameRight.textContent = surahNames[0] || '...';
      surahNameLeft.textContent  = surahNames[0] || '';
    }
    juzLabel.textContent  = getJuzName(firstVerse.juz_number  || 1);
    hizbLabel.textContent = getHizbLabel(firstVerse.hizb_number || 1);

    let html = '';
    let lastSurahId = null;
    const [firstSid, firstAyah] = firstVerse.verse_key.split(':').map(Number);

    if (firstAyah === 1) {
      html += buildSurahBanner(chapMap[firstSid] || `سورة ${firstSid}`);
      if (firstSid !== 9 && firstSid !== 1)
        html += `<div class="basmala">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>`;
    }
    html += `<div class="verses-container">`;
    lastSurahId = firstSid;

    verses.forEach(verse => {
      const [sid, ayah] = verse.verse_key.split(':').map(Number);
      if (sid !== lastSurahId) {
        html += `</div>`;
        html += buildSurahBanner(chapMap[sid] || `سورة ${sid}`);
        if (sid !== 9)
          html += `<div class="basmala">بِسْمِ ٱللَّهِ ٱلرَّحْمَٰنِ ٱلرَّحِيمِ</div>`;
        html += `<div class="verses-container">`;
        lastSurahId = sid;
      }
      html += `<span class="verse-text">${verse.text_uthmani}</span>`;
      html += `<span class="verse-number"><span>${toAr(ayah)}</span></span> `;
    });
    html += `</div>`;
    pageContent.innerHTML = html;

  } catch {
    pageContent.innerHTML = `<div class="error-state"><div class="error-icon">⚠️</div><div class="error-text">تعذّر تحميل الصفحة. تحقق من اتصالك بالإنترنت ثم حاول مجدداً.</div><button class="retry-btn" onclick="loadPage(${pageNum})">إعادة المحاولة</button></div>`;
    surahNameRight.textContent = '─';
    juzLabel.textContent = '─';
  }
  isLoading = false;
}

function goToPage(page) {
  if (page < 1 || page > TOTAL_PAGES) return;
  currentPage = page;
  localStorage.setItem(STORAGE_KEY, page);
  loadPage(page);
}

// أزرار التنقل
doneBtn.addEventListener('click', () => {
  if (currentPage >= TOTAL_PAGES) { finishModal.classList.remove('hidden'); return; }
  goToPage(currentPage + 1);
});
prevBtn.addEventListener('click', () => goToPage(currentPage - 1));
nextBtn.addEventListener('click', () => goToPage(currentPage + 1));
gotoBtn.addEventListener('click', () => {
  const val = parseInt(gotoInput.value);
  if (!isNaN(val) && val >= 1 && val <= TOTAL_PAGES) { goToPage(val); gotoInput.value = ''; }
});
gotoInput.addEventListener('keydown', e => { if(e.key==='Enter') gotoBtn.click(); });
restartBtn.addEventListener('click', () => { finishModal.classList.add('hidden'); goToPage(1); });

// ═══ PWA Install ═══
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  installBanner.classList.remove('hidden');
});

installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') installBanner.classList.add('hidden');
  deferredPrompt = null;
});

dismissBtn.addEventListener('click', () => {
  installBanner.classList.add('hidden');
});

window.addEventListener('appinstalled', () => {
  installBanner.classList.add('hidden');
});

// ═══ Swipe للتنقل بين الصفحات ═══
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive:true });
document.addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 60) {
    if (diff > 0) goToPage(currentPage + 1);
    else goToPage(currentPage - 1);
  }
}, { passive:true });

loadPage(currentPage);
</script>
